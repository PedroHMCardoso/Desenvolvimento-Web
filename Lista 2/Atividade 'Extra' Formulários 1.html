<html>
    <head>
        <title>Exercicio Treino</title>
    </head>
    <body>
        <table>
            <form>
                <h1>Formulário de Adesão</h1>

                <table>
                    <tr>
                    
                        <td><label for="nome">Nome</label></td>
                        <td><input type="text" name="nome" id="nome" placeholder="Nome"></td>
                        <td><input type="text" name="sobrenome" id="nome" placeholder="Sobrenome"></td>
                        
                    </tr>
                    <tr>
                        <td><label for="email">E-mail</label></td>
                        <td><input type="email" name="e-mail" id="e-mail"></td>
                    </tr>
                    <tr>
                        <td><label for="Telefone">Telefone</label></td>
                        <td><input type="tel" placeholder="Seu Telefone"></td>
                    </tr>
                    <tr>
                        <td rowspan="3"><label for="Endereço">Endereço</label></td>
                        <td><input type="text" name="endereço" id="endereço" placeholder="Rua"></td>
                    </tr>
                    <tr>
                        <td><input type="text" placeholder="Cidade"></td>
                        <td><input type="text" placeholder="Estado"></td>
                    </tr>
                    <tr>
                        <td><input type="text" placeholder="CEP"></td>
                        <td><input type="text" placeholder="País"></td>
                    </tr>
                    <tr>
                        <td><label for="Adesão">Planos de Adesão</label></td>
                        <td><input type="radio" name="plano">Padrão(R$200/Ano)</input><input type="radio" name="plano">Prata (R$400/Ano)</input><input type="radio" name="plano">Ouro (R$600)</input></td>
                    </tr>
                    <tr>
                        <td><label for="Indicação"></label>Como você fico <br> sabendo de nós?</td>
                        <td><input type="checkbox" name="Indicação">Um amigo</input> <br> <input type="checkbox" name="Indicação">Facebook</input> <br> <input type="checkbox" name="Indicação">Twitter</input> <br> <input type="checkbox" name="Indicação">Jornais</input> <br> <input type="checkbox" name="Indicação">Páginas Amarelas</input> <br> <input type="checkbox" name="Indicação">Outros</input></td>
                    </tr>
                    <tr>
                        <td><label for="comentarios">Comentários</label></td>
                        <!-- <td><input type="textarea" name="comentarios" placeholder="De o seu feedback" ></td> -->
                        <td><textarea name="comentarios" rows="5"></textarea></td>
                    </tr>
                    <tr>
                        <td><label for="Termos">Termos de Serviço</label></td>
                        <td><input type="checkbox" name="termos">Eu concordo com os termos de serviço</input></td>
                    </tr>
                    <tr>
                        <td><label for="Assinatura"> Assinatura Digital</label></td>
                        <td><textarea name="Assinatura" rows="4" cols="50"></textarea></td>
                    </tr>
                    <tr>
                        <td><label for="botão"></label></td>
                        <td><input type="submit"></td>
                    </tr>
                </table>
            </form>
        </table>
    </body>
</html>
