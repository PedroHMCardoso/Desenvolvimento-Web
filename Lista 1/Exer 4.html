<!-- Crie uma página HTML com o título “Minha Rotina de Estudos”. -->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Minha Rotina de Estudos</title>

    <style>
        .sub_cabecalho{
            font-weight: bold;
        }
    </style>
</head>
<body>
    <h1><strong>Quadro de Horarios de Estudo</strong></h1>
    <p><em>A tabela abaixo mostra minha divisão de estudos</em>.</p>

    <table border="width=200px;">
        <caption><i>Tabela</i></caption>
        <thead>
            
            <tr>
                <th colspan="3">Quadro de Estudos</th>
            </tr>
            
        </thead>
        <tbody>

            <tr>
                <td class="sub_cabecalho">Dia</td>
                <td class="sub_cabecalho">Disciplina</td>
                <td class="sub_cabecalho">Horário</td>
            </tr>
            <tr>
                <td>Segunda</td>
                <td>Sistemas Operacionais</td>
                <td>1h20min</td>
            </tr>
            <tr>
                <td>Quarta</td>
                <td>Desenvolvimento Web</td>
                <td>1h30min</td>
            </tr>
            <tr>
                <td>Sexta</td>
                <td>Algoritmos 1</td>
                <td>1h10min</td>
            </tr>

        </tbody>
    </table>
    <p><i>Tabela de Estudos</i></p>
    
</body>  
</html>
